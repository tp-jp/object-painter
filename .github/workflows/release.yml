name: Build Release

on:
  workflow_dispatch:

jobs:
  # Validate Repository Configuration
  config:
    runs-on: ubuntu-latest
    outputs:
      config_package: ${{ steps.config_package.outputs.configPackage }}

    steps:
      # Ensure that required repository variable has been created for the Package
      - name: Validate Package Config
        id: config_package
        env:
          PACKAGE_NAME: ${{ vars.PACKAGE_NAME }}
        run: |
          if [ -n "$PACKAGE_NAME" ]; then
            echo "configPackage=true" >> "$GITHUB_OUTPUT"
          else
            echo "configPackage=false" >> "$GITHUB_OUTPUT"
          fi

  # Build and release the Package
  # If the repository is not configured properly, this job will be skipped
  build:
    needs: config
    if: needs.config.outputs.config_package == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      packagePath: Packages/${{ vars.PACKAGE_NAME }}

    steps:
      # Checkout Local Repository
      - name: Checkout
        uses: actions/checkout@v6

      # Get the Package version based on the package.json file
      - name: Get Version
        id: version
        run: |
          version=$(jq -r '.version' "${{ env.packagePath }}/package.json")

          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::package.json does not contain a valid version."
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

      # Configure the Environment Variables needed for releasing the Package
      - name: Set Environment Variables
        run: |
          echo "zipFile=${{ vars.PACKAGE_NAME }}-${{ steps.version.outputs.value }}.zip" >> "$GITHUB_ENV"
          echo "unityPackage=${{ vars.PACKAGE_NAME }}-${{ steps.version.outputs.value }}.unitypackage" >> "$GITHUB_ENV"
          echo "version=${{ steps.version.outputs.value }}" >> "$GITHUB_ENV"

      # Zip the Package for release
      - name: Create Package Zip
        working-directory: ${{ env.packagePath }}
        run: zip -r "${{ github.workspace }}/${{ env.zipFile }}" .

      - name: Create Package Root Meta
        run: |
          package_meta="${{ env.packagePath }}.meta"

          if [ ! -f "$package_meta" ]; then
            guid=$(printf '%s' "${{ vars.PACKAGE_NAME }}" | md5sum | cut -d ' ' -f 1)

            cat > "$package_meta" << EOF
          fileFormatVersion: 2
          guid: $guid
          folderAsset: yes
          DefaultImporter:
            externalObjects: {}
            userData:
            assetBundleName:
            assetBundleVariant:
          EOF
          fi

      - name: Create UnityPackage
        uses: natsuneko-laboratory/create-unitypackage@v3
        with:
          files-glob: |
            ${{ env.packagePath }}/**
          dest: ${{ env.unityPackage }}

      # Publish the Release to GitHub
      # The release action also creates the tag when it does not exist
      - name: Make Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.zipFile }}
            ${{ env.unityPackage }}
            ${{ env.packagePath }}/package.json
          tag_name: ${{ env.version }}
          target_commitish: ${{ github.sha }}

      - name: Call Workflow
        env:
          GH_TOKEN: ${{ secrets.VPM_REPOS_PAT }}
        run: |
          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/tp-jp/vpm-repos/dispatches \
            --data '{"event_type":"on-demand-build"}'